<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minhas notas</title>
    <script>
      window.addEventListener('error', function(e) {
        var div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.width = '100vw';
        div.style.height = '100vh';
        div.style.backgroundColor = '#1a1a1a';
        div.style.color = '#ff6b6b';
        div.style.padding = '30px';
        div.style.fontFamily = 'monospace';
        div.style.fontSize = '14px';
        div.style.lineHeight = '1.5';
        div.style.zIndex = '999999';
        div.style.overflow = 'auto';
        div.style.boxSizing = 'border-box';
        div.innerHTML = '<h2 style="color: #ff4747; margin-top: 0;">⚠️ Erro de Execução Detectado</h2>' +
          '<p><strong>Mensagem:</strong> ' + e.message + '</p>' +
          '<p><strong>Arquivo:</strong> ' + e.filename + ' (linha ' + e.lineno + ', coluna ' + e.colno + ')</p>' +
          '<p><strong>Stack-trace:</strong></p>' +
          '<pre style="background: #2b2b2b; padding: 15px; border-radius: 8px; border: 1px solid #444; color: #eee; overflow-x: auto;">' + 
          (e.error ? e.error.stack : 'Nenhum stack-trace disponível.') + '</pre>' +
          '<p style="color: #888; font-size: 11px; margin-top: 20px;">Por favor, envie este erro para o assistente corrigir!</p>';
        document.body.appendChild(div);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
